<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>BIG CAT BATTLE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nunito:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#08080f;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Nunito',sans-serif;background:var(--bg);display:flex;align-items:center;justify-content:center;}
.wrap{width:100%;max-width:460px;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden;}
.screen{display:none;flex:1;flex-direction:column;}
.screen.active{display:flex;}

/* ── TITLE ── */
#s-title{align-items:center;justify-content:center;gap:18px;
  background:radial-gradient(ellipse at 50% 30%,#1e0840,#08080f);padding:28px 20px;}
.t-logo{font-family:'Black Han Sans',sans-serif;font-size:50px;color:#fff;
  letter-spacing:4px;text-align:center;
  text-shadow:0 0 20px #FF4500,0 0 80px #FF450044;
  animation:logoPulse 2.5s ease-in-out infinite;}
@keyframes logoPulse{0%,100%{text-shadow:0 0 20px #FF4500,0 0 60px #FF450044;}
  50%{text-shadow:0 0 40px #FF4500,0 0 120px #FF450077;}}
.t-sub{font-size:11px;color:#666;letter-spacing:4px;text-transform:uppercase;}
.t-cats{display:flex;gap:10px;}
.t-cat{width:60px;height:68px;border-radius:12px;overflow:hidden;border:2px solid #222;cursor:pointer;transition:all 0.2s;}
.t-cat:hover{transform:scale(1.1);border-color:#FF4500;}
.t-cat img{width:100%;height:100%;object-fit:cover;}
.btn-go{background:linear-gradient(135deg,#FF4500,#FF8C00);color:#fff;border:none;
  border-radius:14px;padding:14px 44px;font-family:'Black Han Sans',sans-serif;
  font-size:22px;letter-spacing:2px;cursor:pointer;box-shadow:0 4px 24px #FF450055;transition:all 0.12s;}
.btn-go:active{transform:scale(0.97);}
.btn-go:disabled{opacity:0.3;cursor:default;}

/* ── SELECT ── */
#s-select{align-items:center;padding:14px 12px;gap:12px;
  background:radial-gradient(ellipse at 50% 10%,#1e0840,#08080f);}
.sel-title{font-family:'Black Han Sans',sans-serif;font-size:20px;color:#fff;letter-spacing:3px;}
.sel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;}
.sel-card{background:#111120;border:2px solid #222233;border-radius:14px;
  padding:9px 5px;display:flex;flex-direction:column;align-items:center;gap:5px;
  cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;}
.sel-card::before{content:'';position:absolute;inset:0;opacity:0;
  background:radial-gradient(ellipse at 50% 0%,var(--c,#FF4500)22,transparent 70%);transition:opacity 0.2s;}
.sel-card:hover::before,.sel-card.on::before{opacity:1;}
.sel-card:hover,.sel-card.on{border-color:var(--c,#FF4500);transform:translateY(-3px);}
.sel-card img{width:72px;height:80px;object-fit:contain;position:relative;z-index:1;}
.sel-name{font-family:'Black Han Sans',sans-serif;font-size:12px;color:#fff;position:relative;z-index:1;}
.sel-type{font-size:9px;font-weight:900;padding:2px 7px;border-radius:10px;color:#fff;position:relative;z-index:1;}

/* ── BATTLE ── */
#s-battle{background:#08080f;}

/* HUD */
.hud{padding:7px 10px 5px;background:#0d0d1a;border-bottom:1px solid #1a1a28;flex-shrink:0;}
.hud-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.hud-name{font-family:'Black Han Sans',sans-serif;font-size:11px;color:#bbb;
  width:68px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hud-bar{flex:1;height:12px;background:#1a1a28;border-radius:6px;overflow:hidden;}
.hud-fill{height:100%;border-radius:6px;transition:width 0.35s ease;}
.hud-fill.p{background:linear-gradient(90deg,#00e07a,#00c060);}
.hud-fill.e{background:linear-gradient(90deg,#ff3a3a,#ff7700);}
.hud-fill.crit{animation:critP 0.4s ease-in-out infinite;}
@keyframes critP{0%,100%{opacity:1;}50%{opacity:0.5;}}
.hud-hp{font-size:10px;color:#555;width:80px;text-align:right;font-weight:900;}
.hud-bot{display:flex;justify-content:space-between;align-items:center;}
.hud-lv{font-size:10px;color:#444;font-weight:900;padding:2px 7px;background:#131320;border-radius:8px;}
.hud-turn{font-size:11px;font-weight:900;letter-spacing:1px;}

/* ARENA */
.arena{flex:1;position:relative;overflow:hidden;min-height:190px;
  background:linear-gradient(180deg,#0c0c1e,#08080f 55%,#0a0a12);}
.floor{position:absolute;bottom:48px;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,#2a2a4a 20%,#3a3a6a 50%,#2a2a4a 80%,transparent);}
.floor-glow{position:absolute;bottom:44px;left:10%;right:10%;height:8px;
  background:radial-gradient(ellipse,#4444aa22,transparent);}
.flash{position:absolute;inset:0;pointer-events:none;z-index:50;opacity:0;}
.fighter{position:absolute;bottom:50px;display:flex;flex-direction:column;align-items:center;}
.fighter.left{left:2%;}
.fighter.right{right:2%;}
.f-img{width:140px;height:158px;object-fit:contain;
  filter:drop-shadow(0 6px 12px rgba(0,0,0,0.9));transition:filter 0.08s;}
.fighter.right .f-img{transform:scaleX(-1);}
.f-shadow{width:86px;height:12px;background:radial-gradient(ellipse,rgba(0,0,0,0.7),transparent);border-radius:50%;margin-top:-3px;}
.f-type-tag{position:absolute;top:6px;font-size:9px;font-weight:900;
  padding:2px 8px;border-radius:12px;color:#fff;letter-spacing:1px;}
.f-type-tag.left{left:5px;}
.f-type-tag.right{right:5px;}

/* item indicator above fighter */
.item-boost{position:absolute;font-size:18px;
  animation:itemFloat 0.6s ease-out forwards;}
@keyframes itemFloat{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-40px);}}

/* damage */
.dmg{position:absolute;font-family:'Black Han Sans',sans-serif;
  pointer-events:none;z-index:60;animation:dmgA 0.9s ease-out forwards;}
@keyframes dmgA{0%{opacity:1;transform:translateY(0) scale(0.7);}20%{transform:translateY(-8px) scale(1.2);}100%{opacity:0;transform:translateY(-60px) scale(0.9);}}
.dmg.big{font-size:36px;}
.dmg.med{font-size:26px;}
.super-badge{position:absolute;top:32%;left:50%;transform:translateX(-50%);
  font-family:'Black Han Sans',sans-serif;font-size:20px;color:#FFD700;letter-spacing:3px;
  text-shadow:0 0 20px #FFD700,0 0 50px #FF4500;pointer-events:none;z-index:70;
  animation:superA 0.9s ease-out forwards;}
@keyframes superA{0%{opacity:0;transform:translateX(-50%) scale(0.4);}30%{opacity:1;transform:translateX(-50%) scale(1.1);}70%{opacity:1;}100%{opacity:0;transform:translateX(-50%) scale(1);}}

/* ITEM BOARD above arena */
.item-board{
  display:flex;justify-content:space-between;align-items:center;
  padding:4px 10px;background:#0b0b18;border-bottom:1px solid #151525;flex-shrink:0;}
.item-slot{display:flex;gap:4px;align-items:center;}
.item-pill{
  font-size:13px;padding:3px 7px;border-radius:8px;
  background:#111120;border:1px solid #2a2a3a;cursor:pointer;
  transition:all 0.12s;position:relative;font-weight:900;}
.item-pill:hover{transform:scale(1.08);}
.item-pill.used{opacity:0.35;cursor:default;}
.item-pill .ipcount{position:absolute;top:-4px;right:-4px;
  background:#FF4500;color:#fff;font-size:8px;font-weight:900;
  width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.boost-active{
  font-size:10px;color:#FFD700;font-weight:900;
  background:#1a1a0a;border:1px solid #FFD70055;
  border-radius:8px;padding:2px 8px;animation:boostPulse 0.8s ease-in-out infinite;}
@keyframes boostPulse{0%,100%{opacity:1;}50%{opacity:0.6;}}

/* LOG */
.log{padding:6px 12px;min-height:40px;background:#0b0b18;
  border-top:1px solid #161625;font-size:13px;color:#ccc;font-weight:700;
  text-align:center;line-height:1.4;flex-shrink:0;}
.log .hl{color:#FFD700;}
.log .red{color:#ff5555;}
.log .grn{color:#44ff88;}

/* SKILLS */
.skills{padding:6px 9px 10px;background:#0d0d1a;flex-shrink:0;}
.sk-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;}
.sk{padding:8px 9px;border:none;border-radius:11px;
  font-family:'Nunito',sans-serif;font-weight:900;font-size:12px;
  cursor:pointer;display:flex;align-items:center;gap:7px;
  transition:all 0.1s;color:#fff;border:2px solid transparent;position:relative;overflow:hidden;}
.sk:active{transform:scale(0.95);}
.sk:disabled{opacity:0.28;cursor:not-allowed;transform:none!important;}
.sk .ico{font-size:19px;flex-shrink:0;}
.sk .inf{display:flex;flex-direction:column;align-items:flex-start;line-height:1.2;}
.sk .nm{font-size:12px;}
.sk .pw{font-size:9px;opacity:0.65;}
.sk .cd{position:absolute;top:3px;right:5px;font-size:9px;color:#FFD70099;font-weight:900;}
.sk-a{background:#1c0b0b;border-color:#FF4500;}
.sk-a:not(:disabled):hover{box-shadow:0 0 12px #FF450055;}
.sk-d{background:#0b0b1c;border-color:#4488ff;}
.sk-d:not(:disabled):hover{box-shadow:0 0 12px #4488ff55;}
.sk-1{background:#180b1c;border-color:#bb44ff;}
.sk-1:not(:disabled):hover{box-shadow:0 0 12px #bb44ff55;}
.sk-2{background:#0b1c0e;border-color:#44ff88;}
.sk-2:not(:disabled):hover{box-shadow:0 0 12px #44ff8855;}

/* SECRET BUTTON */
.sk-secret{
  background:linear-gradient(135deg,#1a0a1a,#0d001a);
  border-color:#ff00ff;
  animation:secretPulse 0.6s ease-in-out infinite;
  grid-column:span 2;
}
@keyframes secretPulse{0%,100%{box-shadow:0 0 8px #ff00ff55;}50%{box-shadow:0 0 24px #ff00ffaa,0 0 50px #ff00ff44;}}
.sk-secret:not(:disabled):hover{box-shadow:0 0 30px #ff00ffaa!important;}

/* COMBO INPUT DISPLAY */
.combo-display{
  display:flex;gap:3px;align-items:center;justify-content:center;
  padding:3px 0 0;font-size:12px;min-height:18px;}
.combo-key{
  width:18px;height:18px;border-radius:4px;
  border:1px solid #333;background:#111120;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:#888;transition:all 0.1s;}
.combo-key.hit{border-color:#FFD700;color:#FFD700;background:#1a1a00;}
.combo-key.wrong{border-color:#ff4444;color:#ff4444;animation:wrongFlash 0.2s;}
@keyframes wrongFlash{0%,100%{opacity:1;}50%{opacity:0;}}

/* STREAK */
.streak-badge{
  position:absolute;top:28%;right:4%;
  font-family:'Black Han Sans',sans-serif;
  font-size:13px;color:#FF4500;
  text-shadow:0 0 10px #FF4500;
  opacity:0;transition:opacity 0.2s;}
.streak-badge.show{opacity:1;}

/* RESULT */
#result{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);
  z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
#result.show{display:flex;}
.res-cat{font-size:70px;animation:resCat 1s ease-in-out infinite;}
@keyframes resCat{0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);}}
.res-title{font-family:'Black Han Sans',sans-serif;font-size:50px;
  animation:resPop 0.5s cubic-bezier(0.36,0.07,0.19,0.97) both;}
@keyframes resPop{0%{transform:scale(0);opacity:0;}60%{transform:scale(1.15);}100%{transform:scale(1);opacity:1;}}
.res-win{color:#FFD700;text-shadow:0 0 30px #FFD700,0 0 80px #FF4500;}
.res-lose{color:#ff4444;text-shadow:0 0 30px #ff4444;}
.res-sub{font-size:14px;color:#888;font-weight:700;}
.btn-retry{background:linear-gradient(135deg,#FF4500,#FF8C00);color:#fff;border:none;
  border-radius:12px;padding:12px 38px;font-family:'Black Han Sans',sans-serif;
  font-size:18px;letter-spacing:2px;cursor:pointer;box-shadow:0 4px 20px #FF450055;}
.btn-retry:active{transform:scale(0.97);}

/* key hints */
.key-hints{display:flex;justify-content:space-around;padding:0 8px 2px;opacity:0.35;}
.kh{font-size:9px;color:#666;font-weight:700;text-align:center;}
</style>
</head>
<body>
<div class="wrap">

<!-- TITLE -->
<div id="s-title" class="screen active">
  <div class="t-logo">BIG CAT<br>BATTLE</div>
  <div class="t-sub">⚔ choose your fighter ⚔</div>
  <div class="t-cats" id="t-cats"></div>
  <button class="btn-go" onclick="showSelect()">FIGHT! 🐱</button>
</div>

<!-- SELECT -->
<div id="s-select" class="screen">
  <div class="sel-title">YOUR FIGHTER</div>
  <div class="sel-grid" id="sel-grid"></div>
  <button class="btn-go" id="btn-ok" onclick="goFight()" disabled>BATTLE! ⚔️</button>
</div>

<!-- BATTLE -->
<div id="s-battle" class="screen">
  <div class="hud">
    <div class="hud-row">
      <div class="hud-name" id="h-pname">PLAYER</div>
      <div class="hud-bar"><div class="hud-fill p" id="h-pbar" style="width:100%"></div></div>
      <div class="hud-hp" id="h-php">7000/7000</div>
    </div>
    <div class="hud-row">
      <div class="hud-name" id="h-ename">ENEMY</div>
      <div class="hud-bar"><div class="hud-fill e" id="h-ebar" style="width:100%"></div></div>
      <div class="hud-hp" id="h-ehp">7000/7000</div>
    </div>
    <div class="hud-bot">
      <div class="hud-lv" id="h-plv">LV 5</div>
      <div class="hud-turn" id="h-turn" style="color:#FFD700">▶ YOUR TURN</div>
      <div class="hud-lv" id="h-elv">LV 4</div>
    </div>
  </div>

  <!-- ITEM BOARD -->
  <div class="item-board">
    <div class="item-slot" id="p-items"></div>
    <div class="boost-active" id="p-boost" style="display:none">⚡ 2× BOOST!</div>
    <div style="font-size:10px;color:#333;font-weight:900;">ITEMS</div>
    <div class="boost-active" id="e-boost" style="display:none;color:#ff5555">⚡ 2× BOOST!</div>
    <div class="item-slot" id="e-items" style="flex-direction:row-reverse"></div>
  </div>

  <div class="arena" id="arena">
    <div class="floor"></div>
    <div class="floor-glow"></div>
    <div class="flash" id="flash"></div>
    <div class="f-type-tag left" id="p-tag">🔥 FIRE</div>
    <div class="f-type-tag right" id="e-tag">💧 WATER</div>
    <div class="fighter left" id="f-player">
      <img class="f-img" id="img-p" src="" alt="">
      <div class="f-shadow"></div>
    </div>
    <div class="fighter right" id="f-enemy">
      <img class="f-img" id="img-e" src="" alt="">
      <div class="f-shadow"></div>
    </div>
    <div class="streak-badge" id="streak-badge">🔥 2 HIT!</div>
  </div>

  <div class="log" id="log">Battle! <span class="hl">YOUR TURN!</span> ⚡</div>

  <div class="skills">
    <div class="sk-grid" id="sk-grid">
      <button class="sk sk-a" id="b0" onclick="act('a')">
        <span class="ico">👊</span>
        <div class="inf"><div class="nm" id="sk0n">ATTACK</div><div class="pw">BASE 100</div></div>
      </button>
      <button class="sk sk-d" id="b1" onclick="act('d')">
        <span class="ico">🛡️</span>
        <div class="inf"><div class="nm">DEFEND</div><div class="pw">-50% DMG</div></div>
      </button>
      <button class="sk sk-1" id="b2" onclick="act('s1')">
        <span class="ico" id="sk1i">⚡</span>
        <div class="inf"><div class="nm" id="sk1n">SPECIAL</div><div class="pw" id="sk1pw">PWR ×1.8</div></div>
        <div class="cd" id="cd1"></div>
      </button>
      <button class="sk sk-2" id="b3" onclick="act('s2')">
        <span class="ico" id="sk2i">💥</span>
        <div class="inf"><div class="nm" id="sk2n">COMBO</div><div class="pw" id="sk2pw">PWR ×1.5×2</div></div>
        <div class="cd" id="cd2"></div>
      </button>
    </div>
    <!-- secret button injected here -->
    <div class="combo-display" id="combo-display"></div>
    <div class="key-hints">
      <div class="kh">← / Z<br>ATK</div>
      <div class="kh">↓ / X<br>DEF</div>
      <div class="kh">↑ / C<br>SP1</div>
      <div class="kh">→ / V<br>SP2</div>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="result">
  <div class="res-cat" id="r-cat">🐱</div>
  <div class="res-title" id="r-title">YOU WIN!</div>
  <div class="res-sub" id="r-sub"></div>
  <button class="btn-retry" onclick="doRetry()">RETRY ↺</button>
</div>
</div>

/* type effectiveness for basic attacks */
/* water>fire, fire<water, grass>water, water<grass */
function getTypeEff(atkType, defType) {
  const chart = {
    water:{fire:2.0, grass:0.5},
    fire: {water:0.5, grass:2.0},  // 불은 물에 절반, 풀엔 2배
    grass:{water:2.0, fire:0.5},   // 풀은 물에 2배, 불엔 절반
    fight:{dark:1.5},
    dark: {fight:0.7},
  };
  return chart[atkType]?.[defType] ?? 1.0;
}

/* skill modifier for fight/dark */
function getSkillMod(atkType, defType, skillKey) {
  const cat = Object.values(CATS).find(c=>c.type===atkType);
  return cat?.fightMod?.[defType]?.[skillKey] ?? 1.0;
}

/* ══════════════════════════════════
   ANIMATOR
══════════════════════════════════ */
const animators = {};
function playAnim(key, frames, fps, onDone) {
  stopAnim(key);
  let i = 0;
  const el = document.getElementById(key);
  if (!el || !frames?.length) { onDone?.(); return; }
  el.src = frames[0];
  const iv = setInterval(() => {
    i++;
    if (i >= frames.length) { clearInterval(iv); delete animators[key]; onDone?.(); return; }
    el.src = frames[i];
  }, 1000 / fps);
  animators[key] = iv;
}
function loopAnim(key, frames, fps) {
  stopAnim(key);
  let i = 0;
  const el = document.getElementById(key);
  if (!el || !frames?.length) return;
  el.src = frames[0];
  const iv = setInterval(() => { i = (i+1)%frames.length; el.src = frames[i]; }, 1000/fps);
  animators[key] = iv;
}
function stopAnim(key) { if (animators[key]) { clearInterval(animators[key]); delete animators[key]; } }

/* ══════════════════════════════════
   SELECT
══════════════════════════════════ */
function showSelect() {
  switchScreen('s-select');
  const g = document.getElementById('sel-grid'); g.innerHTML='';
  Object.entries(CATS).forEach(([k,c]) => {
    const card = document.createElement('div');
    card.className='sel-card'; card.style.setProperty('--c', c.color);
    card.innerHTML=`<img id="sel-img-${k}" src="${SP[k].idle[0]}" style="width:72px;height:80px;object-fit:contain;position:relative;z-index:1;">
      <div class="sel-name">${c.name}</div>
      <div class="sel-type" style="background:${c.color}">${c.tag}</div>`;
    card.addEventListener('mouseenter',()=>loopAnim('sel-img-'+k,SP[k].idle,7));
    card.addEventListener('mouseleave',()=>{ stopAnim('sel-img-'+k); document.getElementById('sel-img-'+k).src=SP[k].idle[0]; });
    card.addEventListener('click',()=>{
      document.querySelectorAll('.sel-card').forEach(x=>x.classList.remove('on'));
      card.classList.add('on'); selKey=k;
      document.getElementById('btn-ok').disabled=false;
    });
    g.appendChild(card);
  });
}
function goFight() {
  if(!selKey) return;
  const keys=Object.keys(CATS).filter(k=>k!==selKey);
  initBattle(selKey, keys[Math.floor(Math.random()*keys.length)]);
}

══════════════════════════════════ */
function initBattle(pk, ek) {
  pKey=pk; eKey=ek;
  const pc=CATS[pk], ec=CATS[ek];
  pMaxHp=pc.hp; pHp=pMaxHp;
  eMaxHp=ec.hp; eHp=eMaxHp;
  myTurn=true; busy=false; shielded=false;
  cd1=0; cd2=0;
  pStreak=0; shieldCharge=false; secretVisible=false;
  comboBuffer=[]; comboTarget=null; comboDisplayKeys=[];

  /* items: each cat gets 2 boost items */
  pItems={count:2, boosting:false}; pBoostTurns=0;
  eItems={count:2, boosting:false}; eBoostTurns=0;

  /* HUD */
  document.getElementById('h-pname').textContent=pc.name;
  document.getElementById('h-ename').textContent=ec.name;
  document.getElementById('h-plv').textContent='LV '+(4+Math.floor(Math.random()*3));
  document.getElementById('h-elv').textContent='LV '+(3+Math.floor(Math.random()*4));
  const pt=document.getElementById('p-tag'); pt.textContent=pc.tag; pt.style.background=pc.color+'bb';
  const et=document.getElementById('e-tag'); et.textContent=ec.tag; et.style.background=ec.color+'bb';

  /* skills */
  document.getElementById('sk0n').textContent=pc.atkName;
  document.getElementById('sk1i').textContent=pc.sk1.icon;
  document.getElementById('sk1n').textContent=pc.sk1.name;
  document.getElementById('sk1pw').textContent=pc.sk1.desc;
  document.getElementById('sk2i').textContent=pc.sk2.icon;
  document.getElementById('sk2n').textContent=pc.sk2.name;
  document.getElementById('sk2pw').textContent=pc.sk2.desc;

  renderItems();
  removeSecretBtn();
  updateBars(); updateComboDisplay();
  setLog('Battle! <span class="hl">YOUR TURN!</span> ⚡');
  setBtns(true);
  document.getElementById('h-turn').textContent='▶ YOUR TURN';
  document.getElementById('h-turn').style.color='#FFD700';
  document.getElementById('p-boost').style.display='none';
  document.getElementById('e-boost').style.display='none';
  document.getElementById('streak-badge').classList.remove('show');

  loopAnim('img-p',SP[pk].idle,7);
  loopAnim('img-e',SP[ek].idle,7);
  switchScreen('s-battle');
  document.getElementById('result').classList.remove('show');
}

/* ══════════════════════════════════
   ITEMS
══════════════════════════════════ */
function renderItems() {
  const pc=CATS[pKey], ec=CATS[eKey];
  const pi=document.getElementById('p-items');
  const ei=document.getElementById('e-items');
  pi.innerHTML=''; ei.innerHTML='';
  for(let i=0;i<pItems.count;i++){
    const b=document.createElement('div');
    b.className='item-pill'; b.textContent=pc.itemEmoji;
    b.title='2× ATK Boost (1 turn)';
    b.onclick=()=>useItem('player');
    pi.appendChild(b);
  }
  for(let i=0;i<eItems.count;i++){
    const b=document.createElement('div');
    b.className='item-pill'; b.textContent=ec.itemEmoji;
    b.style.opacity='0.4'; // enemy items not clickable by player
    ei.appendChild(b);
  }
}

function useItem(who) {
  if(who!=='player') return;
  if(!myTurn||busy) return;
  if(pItems.count<=0) return;
  if(pBoostTurns>0) { setLog('⚡ Boost already active!'); return; }
  pItems.count--;
  pBoostTurns=1;
  pItems.boosting=true;
  renderItems();
  document.getElementById('p-boost').style.display='block';
  const pc=CATS[pKey];
  setLog(`${pc.name} used <span class="hl">${pc.itemEmoji} BOOST ITEM!</span> ⚡ 2× ATK next attack!`);
  flashScreen(pc.color, 0.4);
  spawnFloatText('⚡ 2× BOOST!', 'player', '#FFD700');
}

/* ══════════════════════════════════
   ACTION
══════════════════════════════════ */
function act(type) {
  if(!myTurn||busy) return;
  if(type==='s1'&&cd1>0) return;
  if(type==='s2'&&cd2>0) return;
  busy=true; setBtns(false); shielded=false;

  const pc=CATS[pKey], ec=CATS[eKey];
  const typeEff=getTypeEff(pc.type, ec.type);
  const boostMult = pBoostTurns>0 ? 2.0 : 1.0;
  if(pBoostTurns>0){ pBoostTurns--; pItems.boosting=pBoostTurns>0; document.getElementById('p-boost').style.display=pBoostTurns>0?'block':'none'; }

  let dmg=0, logHtml='', isCrit=(typeEff>1), isHard=false;

  if(type==='a'){
    dmg=calcDmg(pc.atk, 1.0, typeEff, boostMult);
    logHtml=`${pc.name}: <span class="hl">${pc.atkName}!</span>${isCrit?' ⚡ SUPER!':''} ${boostMult>1?'⚡2×':''}`;
    doPlayerAttack(dmg, isCrit||boostMult>1, logHtml, false, false);
  } else if(type==='d'){
    shielded=true;
    setLog(`${pc.name} <span class="hl">DEFENDS!</span> 🛡️ -50% next hit`);
    flashScreen('#4488ff',0.25);
    playAnim('img-p',SP[pKey].idle,8,()=>loopAnim('img-p',SP[pKey].idle,7));
    pStreak=0; // defend resets streak
    hideStreakBadge();
    setTimeout(()=>enemyTurn(), 800);
    return;
  } else if(type==='s1'){
    const skillMod=getSkillMod(pc.type, ec.type,'sk1');
    dmg=calcDmg(pc.atk, pc.sk1.mult * skillMod, typeEff, boostMult);
    isHard=pc.sk1.mult*skillMod > 1.5 || boostMult>1;
    logHtml=`${pc.name}: <span class="hl">${pc.sk1.name}!</span>${isCrit?' ⚡ SUPER!':''} ${boostMult>1?'⚡2×':''} ${skillMod>1?'💢+MOD':''}`;
    cd1=2;
    doPlayerAttack(dmg, isHard||isCrit, logHtml, true);
  } else if(type==='s2'){
    const skillMod=getSkillMod(pc.type, ec.type,'sk2');
    const d1=calcDmg(pc.atk, pc.sk2.mult*skillMod*0.5, typeEff, boostMult);
    const d2=calcDmg(pc.atk, pc.sk2.mult*skillMod*0.5, typeEff, boostMult);
    dmg=d1+d2;
    logHtml=`${pc.name}: <span class="hl">${pc.sk2.name}!</span> ${d1}+${d2} ${boostMult>1?'⚡2×':''}`;
    cd2=2;
    doPlayerAttack(dmg, boostMult>1||isCrit, logHtml, false, true);
  } else if(type==='secret'){
    doSecretSkill(false);
    return;
  } else if(type==='ultraCrit'){
    doSecretSkill(true);
    return;
  }
}

function calcDmg(atk, multSkill, typeEff, boost=1) {
  return Math.max(1, Math.round(atk * multSkill * typeEff * boost * (0.88+Math.random()*0.24)));
}

function doPlayerAttack(dmg, hard, logHtml, bigFx=false, comboFx=false) {
  setLog(logHtml);
  stopAnim('img-p');
  playAnim('img-p',SP[pKey].atk, bigFx?14:11, ()=>loopAnim('img-p',SP[pKey].idle,7));

  setTimeout(()=>{
    stopAnim('img-e');
    playAnim('img-e',SP[eKey].hit,10,()=>loopAnim('img-e',SP[eKey].idle,7));
    shakeArena(hard?'hard':comboFx?'double':'normal');
    flashScreen(CATS[pKey].color, hard?0.6:0.35);
    eHp=Math.max(0,eHp-dmg);
    spawnDmg(dmg,'enemy',hard);
    if(hard) spawnSuper('SUPER!');
    updateBars();
    updateStreakAfterHit(true);
    if(cd1>0) cd1--; if(cd2>0) cd2--;
    setTimeout(()=>{
      if(eHp<=0){endBattle(true);return;}
      myTurn=false;
      document.getElementById('h-turn').textContent='◀ ENEMY TURN';
      document.getElementById('h-turn').style.color='#ff5555';
      setTimeout(()=>enemyTurn(), 650);
    }, comboFx?350:500);
  }, bigFx?220:180);
}

/* ══════════════════════════════════
   SECRET SKILL
══════════════════════════════════ */
function doSecretSkill(isUltra) {
  busy=true; setBtns(false);
  const pc=CATS[pKey], ec=CATS[eKey];
  const typeEff=getTypeEff(pc.type,ec.type);
  const boostMult = pBoostTurns>0 ? 2.0 : 1.0;
  if(pBoostTurns>0){pBoostTurns--;document.getElementById('p-boost').style.display=pBoostTurns>0?'block':'none';}

  let dmg, logHtml;
  if(isUltra){
    // 2× critical ultra
    dmg=calcDmg(pc.atk, 3.0, typeEff, boostMult*2);
    logHtml=`<span class="hl">⭐ ULTRA CRIT! ${pc.sk1.name} MAX!</span> 💥💥`;
    // mega flash sequence
    megaFlash(pc.color);
  } else {
    // shield break + strong hit
    dmg=calcDmg(pc.atk, 2.5, typeEff, boostMult);
    logHtml=`<span class="hl">🔓 SECRET SKILL! Shield Breaker!</span> 💥`;
    flashScreen('#ffffff', 0.8);
  }
  setLog(logHtml);
  stopAnim('img-p');
  playAnim('img-p',SP[pKey].atk,16,()=>loopAnim('img-p',SP[pKey].idle,7));
  setTimeout(()=>{
    stopAnim('img-e');
    playAnim('img-e',SP[eKey].hit,10,()=>loopAnim('img-e',SP[eKey].idle,7));
    shakeArena('hard');
    eHp=Math.max(0,eHp-dmg);
    spawnDmg(dmg,'enemy',true);
    spawnSuper(isUltra?'ULTRA CRIT!':'SECRET!');
    updateBars();
    // reset streak/secret after use
    pStreak=0; shieldCharge=false; secretVisible=false;
    comboBuffer=[]; comboTarget=null; comboDisplayKeys=[];
    updateComboDisplay();
    removeSecretBtn();
    hideStreakBadge();
    if(cd1>0)cd1--; if(cd2>0)cd2--;
    setTimeout(()=>{
      if(eHp<=0){endBattle(true);return;}
      myTurn=false;
      document.getElementById('h-turn').textContent='◀ ENEMY TURN';
      document.getElementById('h-turn').style.color='#ff5555';
      setTimeout(()=>enemyTurn(),700);
    },600);
  },280);
}

function megaFlash(color){
  const f=document.getElementById('flash');
  const colors=[color,'#ffffff',color,'#FFD700','#ffffff',color];
  colors.forEach((c,i)=>setTimeout(()=>{
    f.style.background=c; f.style.opacity=i%2===0?0.7:0.4;
    if(i===colors.length-1) setTimeout(()=>{f.style.opacity=0;},80);
  }, i*70));
}

/* ══════════════════════════════════
   STREAK SYSTEM
══════════════════════════════════ */
function updateStreakAfterHit(hit) {
  if(hit){ pStreak++; } else { pStreak=0; }

  const badge=document.getElementById('streak-badge');
  if(pStreak>=2){
    badge.textContent = pStreak>=3 ? `🔥 ${pStreak} HIT STREAK!` : `🔥 ${pStreak} HIT!`;
    badge.classList.add('show');
  } else { hideStreakBadge(); }

  // 2-streak: 1.5× crit auto applied next hit
  // 3-streak: reveal secret button + combo input
  if(pStreak>=3 && !shieldCharge){
    shieldCharge=true;
    secretVisible=true;
    addSecretBtn();
    setLog('🔓 <span class="hl">3 HIT STREAK!</span> Secret skill unlocked! Enter code! ⬇️');
    startCombo('secret');
  }
}

function hideStreakBadge(){ document.getElementById('streak-badge').classList.remove('show'); }

/* ══════════════════════════════════
   SECRET BUTTON
══════════════════════════════════ */
function addSecretBtn(){
  if(document.getElementById('b-secret')) return;
  const grid=document.getElementById('sk-grid');
  const btn=document.createElement('button');
  btn.className='sk sk-secret'; btn.id='b-secret';
  btn.innerHTML=`<span class="ico">🔓</span><div class="inf"><div class="nm">SECRET</div><div class="pw">Enter combo!</div></div>`;
  btn.onclick=()=>{}; // activated via combo
  grid.appendChild(btn);
}
function removeSecretBtn(){
  const b=document.getElementById('b-secret'); if(b)b.remove();
}

/* ══════════════════════════════════
   COMBO INPUT SYSTEM
══════════════════════════════════ */
function startCombo(mode){
  comboTarget=mode;
  comboBuffer=[];
  const seq = mode==='ultra' ? ULTRA_SEQ : SECRET_SEQ;
  comboDisplayKeys = seq.map(()=>null);
  updateComboDisplay();
}

function updateComboDisplay(){
  const el=document.getElementById('combo-display'); el.innerHTML='';
  if(!comboTarget){ return; }
  const seq = comboTarget==='ultra' ? ULTRA_SEQ : SECRET_SEQ;
  const arrows={left:'←',right:'→',up:'↑',down:'↓'};
  seq.forEach((k,i)=>{
    const d=document.createElement('div');
    d.className='combo-key';
    const entered=comboBuffer[i];
    if(entered===k){ d.classList.add('hit'); d.textContent=arrows[k]; }
    else if(entered===undefined){ d.textContent=arrows[k]; }
    else { d.classList.add('wrong'); d.textContent='✕'; }
    el.appendChild(d);
  });
  const label=document.createElement('div');
  label.style.cssText='font-size:9px;color:#888;margin-left:6px;font-weight:900;';
  label.textContent=comboTarget==='ultra'?'ULTRA!':'SECRET!';
  el.appendChild(label);
}

function handleComboKey(dir){
  if(!comboTarget||!myTurn) return false;
  const seq = comboTarget==='ultra' ? ULTRA_SEQ : SECRET_SEQ;
  const pos=comboBuffer.length;
  comboBuffer.push(dir);
  updateComboDisplay();
  if(comboBuffer[pos]!==seq[pos]){
    // wrong key → reset
    setTimeout(()=>{ comboBuffer=[]; comboDisplayKeys=[]; updateComboDisplay(); },400);
    return true;
  }
  if(comboBuffer.length===seq.length){
    // SUCCESS
    const mode=comboTarget;
    comboBuffer=[]; comboTarget=null; updateComboDisplay();
    if(mode==='secret'){
      // after secret unlocked, switch to ultra listen
      setLog('✅ <span class="hl">SECRET activated!</span> Now enter ULTRA code: ←→↑← for 2× CRIT!');
      setTimeout(()=>startCombo('ultra'),600);
    } else {
      act('ultraCrit');
    }
    return true;
  }
  return true;
}

/* ══════════════════════════════════
   ENEMY TURN
══════════════════════════════════ */
function enemyTurn(){
  const ec=CATS[eKey], pc=CATS[pKey];
  const typeEff=getTypeEff(ec.type,pc.type);

  // enemy uses item randomly with 20% chance if has items
  if(eItems.count>0 && eBoostTurns===0 && Math.random()<0.20){
    eItems.count--;
    eBoostTurns=1;
    document.getElementById('e-boost').style.display='block';
    spawnFloatText('⚡ 2×!','enemy','#ff5555');
  }
  const boostMult=eBoostTurns>0?2.0:1.0;
  if(eBoostTurns>0){eBoostTurns--;document.getElementById('e-boost').style.display=eBoostTurns>0?'block':'none';}

  const roll=Math.random();
  let dmg, logHtml, isHard=false;
  if(roll<0.4){
    dmg=calcDmg(ec.atk,1.0,typeEff,boostMult);
    logHtml=`${ec.name}: <span class="red">${ec.atkName}!</span> ${boostMult>1?'⚡2×':''}`;
  } else if(roll<0.72){
    const sm=getSkillMod(ec.type,pc.type,'sk1');
    dmg=calcDmg(ec.atk,ec.sk1.mult*sm,typeEff,boostMult);
    isHard=ec.sk1.mult*sm>1.5||boostMult>1;
    logHtml=`${ec.name}: <span class="red">${ec.sk1.name}!</span> ${sm>1?'💢':''}${boostMult>1?'⚡2×':''}`;
  } else {
    const sm=getSkillMod(ec.type,pc.type,'sk2');
    const d1=calcDmg(ec.atk,ec.sk2.mult*sm*0.5,typeEff,boostMult);
    const d2=calcDmg(ec.atk,ec.sk2.mult*sm*0.5,typeEff,boostMult);
    dmg=d1+d2;
    logHtml=`${ec.name}: <span class="red">${ec.sk2.name}!</span> ${d1}+${d2}`;
  }
  if(shielded){ dmg=Math.floor(dmg*0.5); logHtml+=' <span style="color:#4488ff">BLOCKED!</span>'; }
  shielded=false;
  setLog(logHtml);

  stopAnim('img-e');
  playAnim('img-e',SP[eKey].atk,11,()=>loopAnim('img-e',SP[eKey].idle,7));
  setTimeout(()=>{
    stopAnim('img-p');
    playAnim('img-p',SP[pKey].hit,10,()=>loopAnim('img-p',SP[pKey].idle,7));
    shakeArena(isHard?'hard':'normal');
    flashScreen(CATS[eKey].color,isHard?0.5:0.3);
    pHp=Math.max(0,pHp-dmg);
    spawnDmg(dmg,'player',isHard);
    if(isHard) spawnSuper('SUPER!');
    updateBars();
    // enemy hit breaks player streak
    if(pStreak>0&&!shieldCharge){ pStreak=0; hideStreakBadge(); }
    renderItems();
    setTimeout(()=>{
      if(pHp<=0){endBattle(false);return;}
      myTurn=true; busy=false;
      document.getElementById('h-turn').textContent='▶ YOUR TURN';
      document.getElementById('h-turn').style.color='#FFD700';
      setLog('Your turn! <span class="hl">Choose a move!</span> ⚡');
      setBtns(true);
    },500);
  },200);
}

/* ══════════════════════════════════
   EFFECTS
══════════════════════════════════ */
function shakeArena(mode){
  const a=document.getElementById('arena');
  a.style.transition='none';
  const seqs={
    hard:   [[7,-2],[-7,3],[6,-2],[-5,2],[4,-1],[-2,0],[0,0]],
    double: [[5,0],[-5,0],[4,0],[-4,0],[2,0],[0,0]],
    normal: [[4,0],[-4,0],[2,0],[0,0]],
  };
  const seq=seqs[mode]||seqs.normal;
  seq.forEach(([x,y],i)=>setTimeout(()=>{
    a.style.transform=`translate(${x}px,${y}px)`;
    if(i===seq.length-1) setTimeout(()=>a.style.transform='',40);
  },i*45));
}

function flashScreen(color,alpha){
  const f=document.getElementById('flash');
  f.style.background=color; f.style.opacity=alpha;
  setTimeout(()=>{f.style.transition='opacity 0.18s';f.style.opacity=0;},80);
  setTimeout(()=>{f.style.transition='';},300);
}

function spawnDmg(dmg,who,big){
  const arena=document.getElementById('arena');
  const el=document.createElement('div');
  el.className='dmg '+(big?'big':'med');
  el.textContent='-'+dmg;
  el.style.color=big?'#FFD700':'#ff6666';
  el.style.textShadow=`0 0 10px ${big?'#FFD700':'#ff4444'}`;
  el.style.left=who==='enemy'?'56%':'2%';
  el.style.top='28%';
  arena.appendChild(el);
  setTimeout(()=>el.remove(),950);
}

function spawnFloatText(text,who,color){
  const arena=document.getElementById('arena');
  const el=document.createElement('div');
  el.style.cssText=`position:absolute;font-family:'Black Han Sans',sans-serif;
    font-size:16px;color:${color||'#FFD700'};pointer-events:none;z-index:65;
    left:${who==='player'?'5%':'55%'};top:55%;
    animation:dmgA 0.9s ease-out forwards;text-shadow:0 0 8px ${color||'#FFD700'};`;
  el.textContent=text;
  arena.appendChild(el); setTimeout(()=>el.remove(),950);
}

function spawnSuper(text='SUPER!'){
  const arena=document.getElementById('arena');
  const el=document.createElement('div');
  el.className='super-badge'; el.textContent=text;
  arena.appendChild(el); setTimeout(()=>el.remove(),950);
}

/* ══════════════════════════════════
   BARS / UI
══════════════════════════════════ */
function updateBars(){
  const pp=Math.max(0,pHp/pMaxHp*100);
  const ep=Math.max(0,eHp/eMaxHp*100);
  const pb=document.getElementById('h-pbar'); pb.style.width=pp+'%';
  pb.className='hud-fill p'+(pp<15?' crit':'');
  const eb=document.getElementById('h-ebar'); eb.style.width=ep+'%';
  eb.className='hud-fill e'+(ep<15?' crit':'');
  document.getElementById('h-php').textContent=pHp+'/'+pMaxHp;
  document.getElementById('h-ehp').textContent=eHp+'/'+eMaxHp;
}
function setLog(h){document.getElementById('log').innerHTML=h;}
function setBtns(on){
  ['b0','b1','b2','b3'].forEach(id=>{ const b=document.getElementById(id); if(b)b.disabled=!on; });
  if(on){
    if(cd1>0) document.getElementById('b2').disabled=true;
    if(cd2>0) document.getElementById('b3').disabled=true;
    document.getElementById('cd1').textContent=cd1>0?`CD:${cd1}`:'';
    document.getElementById('cd2').textContent=cd2>0?`CD:${cd2}`:'';
  }
  // secret btn always disabled (only via combo)
  const sb=document.getElementById('b-secret'); if(sb) sb.disabled=true;
}

/* ══════════════════════════════════
   END
══════════════════════════════════ */
function endBattle(won){
  const pc=CATS[pKey],ec=CATS[eKey];
  stopAnim('img-p'); stopAnim('img-e');
  if(won){ playAnim('img-p',SP[pKey].win,7,()=>loopAnim('img-p',SP[pKey].win,5));
    document.getElementById('img-e').src=SP[eKey].hit[SP[eKey].hit.length-1]; }
  else { playAnim('img-e',SP[eKey].win,7,()=>loopAnim('img-e',SP[eKey].win,5));
    document.getElementById('img-p').src=SP[pKey].hit[SP[pKey].hit.length-1]; }
  setTimeout(()=>{
    const ov=document.getElementById('result'); ov.classList.add('show');
    const t=document.getElementById('r-title');
    if(won){ t.textContent='YOU WIN!'; t.className='res-title res-win';
      document.getElementById('r-cat').textContent=pc.emoji+'🏆';
      document.getElementById('r-sub').textContent=pc.name+' is victorious! 🎉'; }
    else { t.textContent='YOU LOSE!'; t.className='res-title res-lose';
      document.getElementById('r-cat').textContent=ec.emoji+'💔';
      document.getElementById('r-sub').textContent='Train harder! 💪'; }
  },700);
}
function doRetry(){
  document.getElementById('result').classList.remove('show');
  switchScreen('s-select');
  document.querySelectorAll('.sel-card').forEach(c=>c.classList.remove('on'));
  selKey=null; document.getElementById('btn-ok').disabled=true;
}
function switchScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ══════════════════════════════════
   KEYBOARD
══════════════════════════════════ */
const keyMap={
  ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down',
  z:'left',Z:'left', x:'down',X:'down', c:'up',C:'up', v:'right',V:'right',
  ' ':'left'
};
const actionMap={left:'a', down:'d', up:'s1', right:'s2'};

document.addEventListener('keydown', e=>{
  const dir=keyMap[e.key];
  if(!dir) return;
  e.preventDefault();

  // If combo active, feed key into combo first
  if(comboTarget && myTurn){
    const consumed=handleComboKey(dir);
    if(consumed) return;
  }

  // Normal action
  const a=actionMap[dir];
  if(a) act(a);
});
</script>
